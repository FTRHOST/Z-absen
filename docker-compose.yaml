services:
  # ==========================================
  # 1. FRONTEND APP (Aplikasi Zieda Absen)
  # ==========================================
  frontend:
    image: nginx:alpine
    container_name: zieda-absen-frontend
    ports:
      - "8080:80"
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./docker/frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - gateway
    restart: unless-stopped

  # ==========================================
  # 2. API GATEWAY (Supabase API Proxy)
  # ==========================================
  gateway:
    image: nginx:alpine
    container_name: zieda-absen-gateway
    ports:
      - "54321:54321"
    volumes:
      - ./docker/gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - rest
    restart: unless-stopped

  # ==========================================
  # 3. REST API ENGINE (PostgREST)
  # ==========================================
  rest:
    image: postgrest/postgrest:v12.2.0
    container_name: zieda-absen-rest
    environment:
      PGRST_DB_URI: postgresql://postgres:postgres@db:5432/postgres
      PGRST_DB_SCHEMAS: public,storage
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
      PGRST_DB_USE_LEGACY_GUCS: "false"
    depends_on:
      - db
    restart: unless-stopped

  # ==========================================
  # 4. DATABASE (PostgreSQL Supabase Self-Hosted)
  # ==========================================
  db:
    image: supabase/postgres:15.6.1.143
    container_name: zieda-absen-db
    ports:
      - "54322:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    volumes:
      - ./db/01_starter_schema.sql:/docker-entrypoint-initdb.d/01_starter_schema.sql:ro
      - zieda_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ==========================================
  # 5. POSTGRES META (Supabase Studio Metadata API)
  # ==========================================
  pgmeta:
    image: supabase/postgres-meta:v0.84.2
    container_name: zieda-absen-pgmeta
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: postgres
      PG_META_DB_PASSWORD: postgres
    depends_on:
      - db
    restart: unless-stopped

  # ==========================================
  # 6. SUPABASE STUDIO (Dashboard Web Admin DB)
  # ==========================================
  studio:
    image: supabase/studio:latest
    container_name: zieda-absen-studio
    ports:
      - "54323:3000"
    environment:
      STUDIO_PG_META_URL: http://pgmeta:8080
      POSTGRES_PASSWORD: postgres
      DEFAULT_ORGANIZATION_ID: default
      DEFAULT_PROJECT_ID: default
      SUPABASE_URL: http://gateway:54321
      SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      SUPABASE_SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
    depends_on:
      - pgmeta
    restart: unless-stopped

volumes:
  zieda_db_data:
