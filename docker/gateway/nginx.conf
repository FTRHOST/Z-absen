events {
    worker_connections 1024;
}

http {
    client_max_body_size 50M;

    server {
        listen 54321;

        # Global CORS Headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,apikey,x-client-info' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Route /rest/v1/ -> PostgREST Engine
        location /rest/v1/ {
            proxy_pass http://rest:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header apikey $http_apikey;
        }

        # Route /auth/v1/ -> GoTrue Auth Engine
        location /auth/v1/ {
            proxy_pass http://auth:9999/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header apikey $http_apikey;
        }

        # Route /storage/v1/ -> Storage API Engine
        location /storage/v1/ {
            proxy_pass http://storage:5000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header apikey $http_apikey;
        }

        # Default fallback to PostgREST
        location / {
            proxy_pass http://rest:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header apikey $http_apikey;
        }
    }
}
