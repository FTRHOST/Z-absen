<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
      :root {
        --bs-primary: #e5b82a;
        --bs-body-bg: #fdfbf7;
        --bs-body-color: #3e2723;
      }
      body {
        background-color: var(--bs-body-bg) !important;
        color: var(--bs-body-color) !important;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .btn-primary {
        background-color: #e5b82a !important;
        border-color: #e5b82a !important;
        color: #3e2723 !important;
      }
      .btn-primary:hover {
        background-color: #d4af37 !important;
        border-color: #d4af37 !important;
      }
      .login-card {
        border: none;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        overflow: hidden;
      }
      .login-header {
        background: linear-gradient(135deg, #e5b82a, #d4af37) !important;
        color: #3e2723 !important;
        padding: 30px 20px;
        text-align: center;
      }
      .login-header h3 {
        margin: 0;
        font-weight: 700;
      }
      .login-header a {
        color: #3e2723;
        font-weight: 600;
      }
      .login-header a:hover {
        color: #ffffff;
      }
      .login-body {
        padding: 40px 30px;
        background-color: #ffffff;
      }
      .form-control {
        padding: 12px 15px;
        border-radius: 8px;
      }
      .btn-login {
        padding: 12px;
        font-weight: bold;
        border-radius: 8px;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body>
    <div class="container" id="main-container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
          <div class="text-center mb-4 placeholder-glow" id="logo-container">
            <div
              id="logo-skeleton"
              class="placeholder rounded-4"
              style="width: 86px; height: 86px; margin: 0 auto; display: block"
            ></div>
            <img
              id="login-logo"
              src=""
              alt="Logo"
              style="
                max-height: 86px;
                display: none;
                margin: 0 auto;
                border-radius: 12px;
              "
            />
          </div>
          <div class="card login-card">
            <div class="login-header placeholder-glow" id="title-container">
              <span
                id="title-skeleton"
                class="placeholder col-8 rounded"
                style="height: 33px; display: inline-block"
              ></span>
              <h3 id="login-title" class="d-none mb-0">ZIEDA ABSEN</h3>
              <div id="login-subteks-container" class="mt-2 opacity-75 small">
                Silakan masuk ke akun Anda
              </div>
            </div>
            <div class="login-body placeholder-glow" id="login-body-skeleton">
                <span class="placeholder col-4 mb-2 rounded" style="height: 15px; display: inline-block;"></span>
                <span class="placeholder col-12 mb-3 rounded" style="height: 48px; display: inline-block;"></span>
                
                <span class="placeholder col-4 mb-2 rounded" style="height: 15px; display: inline-block;"></span>
                <span class="placeholder col-12 mb-4 rounded" style="height: 48px; display: inline-block;"></span>
                
                <span class="placeholder col-12 rounded mb-3" style="height: 48px; display: inline-block;"></span>
                <div class="text-center">
                    <span class="placeholder col-6 rounded" style="height: 15px; display: inline-block;"></span>
                </div>
            </div>
            <div class="login-body d-none" id="login-body-real">
              <form id="loginForm" onsubmit="prosesLogin(event)">
                <div class="mb-3">
                  <label
                    for="inputNama"
                    class="form-label fw-bold small text-muted"
                    >Nama Pengguna</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="inputNama"
                    placeholder="Masukkan nama Anda"
                    required
                  />
                </div>
                <div class="mb-4">
                  <label
                    for="inputPassword"
                    class="form-label fw-bold small text-muted"
                    >Password</label
                  >
                  <input
                    type="password"
                    class="form-control"
                    id="inputPassword"
                    placeholder="Masukkan password"
                    required
                  />
                </div>

                <div class="d-grid mb-3">
                  <button type="submit" class="btn btn-primary btn-login">
                    LOGIN
                  </button>
                </div>

                <div class="text-center mt-3">
                  <a href="#" class="text-decoration-none small"
                    >Lupa password? Hubungi HR</a
                  >
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Pustaka Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Konfigurasi Global -->
    <script src="config.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        try {
          const { data } = await supabaseClient
            .from("app_settings")
            .select("nama_aplikasi, logo_url, login_subteks")
            .eq("id", 1)
            .single();
          if (data) {
            if (data.nama_aplikasi) {
              document.title = `Login - ${data.nama_aplikasi}`;
              document.getElementById("login-title").innerHTML =
                `${data.nama_aplikasi}`;
            }
            // Sembunyikan skeleton judul dan tampilkan teks aslinya
            document.getElementById('title-skeleton').classList.add('d-none');
            document.getElementById('login-title').classList.remove('d-none');
            
            if (data.login_subteks && window.marked) {
              const subteksHtml = marked.parse(data.login_subteks);
              // override padding/margin of p generated by marked
              document.getElementById("login-subteks-container").innerHTML = subteksHtml.replace(/<p>/g, '<p class="mb-0">');
            }
            
            if (data.logo_url) {
              const logoImg = document.getElementById("login-logo");
              if (logoImg) {
                // Saat gambar selesai diload, hilangkan skeleton logo dan form
                logoImg.onload = () => {
                    document.getElementById('logo-skeleton').classList.add('d-none');
                    logoImg.style.display = "block";
                    document.getElementById('login-body-skeleton').classList.add('d-none');
                    document.getElementById('login-body-real').classList.remove('d-none');
                };
                logoImg.onerror = () => {
                    document.getElementById('logo-skeleton').classList.add('d-none');
                    document.getElementById('login-body-skeleton').classList.add('d-none');
                    document.getElementById('login-body-real').classList.remove('d-none');
                };
                logoImg.src = data.logo_url;
              }
              
              // Set Favicon
              let link = document.querySelector("link[rel~='icon']");
              if (!link) {
                  link = document.createElement('link');
                  link.rel = 'icon';
                  document.head.appendChild(link);
              }
              link.href = data.logo_url;
            } else {
                // Tidak ada logo, sembunyikan skeleton logo dan tampilkan form
                document.getElementById('logo-skeleton').classList.add('d-none');
                document.getElementById('login-body-skeleton').classList.add('d-none');
                document.getElementById('login-body-real').classList.remove('d-none');
            }
          } else {
              document.getElementById('title-skeleton').classList.add('d-none');
              document.getElementById('login-title').classList.remove('d-none');
              document.getElementById('logo-skeleton').classList.add('d-none');
              document.getElementById('login-body-skeleton').classList.add('d-none');
              document.getElementById('login-body-real').classList.remove('d-none');
          }
        } catch (e) {
          console.error(e);
          document.getElementById('title-skeleton').classList.add('d-none');
          document.getElementById('login-title').classList.remove('d-none');
          document.getElementById('logo-skeleton').classList.add('d-none');
          document.getElementById('login-body-skeleton').classList.add('d-none');
          document.getElementById('login-body-real').classList.remove('d-none');
        }
      });

      // ==========================================
      // ==========================================
      // FUNGSI LOGIN
      // ==========================================
      async function prosesLogin(event) {
        event.preventDefault();
        const namaUser = document.getElementById("inputNama").value.trim();
        const password = document.getElementById("inputPassword").value;
        const btnLogin = document.querySelector(".btn-login");

        btnLogin.disabled = true;
        btnLogin.innerHTML = "Memeriksa...";

        try {
          // Bersihkan sesi lama jika pengguna belum logout sempurna (Mencegah konflik auth_id)
          try {
            await supabaseClient.auth.signOut();
          } catch(e) {
            console.warn("signOut non-fatal error:", e);
          }

          // Buat email palsu dari nama user (contoh: budi santoso -> budisantoso@zieabsen.com)
          const dummyEmail = `${namaUser.replace(/\s+/g, "").toLowerCase()}@zieabsen.com`;

          let authResult = await supabaseClient.auth.signInWithPassword({
            email: dummyEmail,
            password: password,
          });

          let userData = null;

          // JIKA BELUM ADA DI SUPABASE AUTH (Belum Migrasi/Data Lama)
          if (
            authResult.error &&
            authResult.error.message.includes("Invalid login credentials")
          ) {
            // 1. Validasi Dulu ke Database (Mencegah Pembuatan Akun Palsu)
            const { data: linkedData, error: linkError } =
              await supabaseClient.rpc("link_my_account", {
                p_nama: namaUser,
                p_password: password,
              });

            if (linkError) {
              console.error("RPC Error:", linkError);
              throw new Error("Kredensial tidak valid atau akun terkunci.");
            }
            if (!linkedData) {
              throw new Error("Nama Pengguna atau Password salah!");
            }

            // 2. Jika valid, daftarkan otomatis ke Supabase Auth
            const signUpResult = await supabaseClient.auth.signUp({
              email: dummyEmail,
              password: password,
            });

            if (
              signUpResult.error &&
              !signUpResult.error.message.includes("already registered")
            ) {
              throw new Error(
                "Gagal mendaftarkan sistem keamanan: " +
                  signUpResult.error.message,
              );
            }

            let authUserId = signUpResult.data?.user?.id;

            // 3. Selalu pastikan kita SignIn untuk mendapatkan Session aktif
            let retryLogin = await supabaseClient.auth.signInWithPassword({
              email: dummyEmail,
              password,
            });
            
            if (retryLogin.error || !retryLogin.data?.user) {
              // Jika gagal, artinya password Auth bentrok dengan password baru di tabel public.users (diubah oleh Admin).
              // Buat email unik baru untuk Auth agar tidak bentrok dengan yang lama.
              const uniqueDummyEmail = `${namaUser.replace(/\s+/g, "").toLowerCase()}_${Date.now()}@zieabsen.com`;
              const newSignUp = await supabaseClient.auth.signUp({
                email: uniqueDummyEmail,
                password: password,
              });
              
              if (newSignUp.error) {
                throw new Error("Sistem keamanan gagal diperbarui: " + newSignUp.error.message);
              }
              
              retryLogin = await supabaseClient.auth.signInWithPassword({
                email: uniqueDummyEmail,
                password: password,
              });
              
              if (retryLogin.error || !retryLogin.data?.user) {
                throw new Error("Sistem keamanan bentrok permanen, hubungi Admin.");
              }
            }
            authUserId = retryLogin.data.user.id;

            // 4. Panggil lagi RPC SETELAH punya session aktif agar auth.uid() tersimpan permanen di tabel users
            await supabaseClient.rpc("link_my_account", {
              p_nama: namaUser,
              p_password: password,
            });

            // Kaitkan ulang auth_id lokal
            userData = linkedData;
            userData.auth_id = authUserId;
          } else if (authResult.error) {
            throw new Error(authResult.error.message);
          } else {
            // JIKA SUDAH PERNAH LOGIN (SUDAH TERDAFTAR DI AUTH)
            let { data: profile } = await supabaseClient
              .from("users")
              .select("*")
              .eq("auth_id", authResult.data.user.id)
              .maybeSingle();

            if (!profile) {
              // Akun Auth ada, tapi public.users belum terikat (Misal karena bug koneksi sebelumnya). Kita ikat paksa sekarang.
              const { data: linkedData, error: linkError } =
                await supabaseClient.rpc("link_my_account", {
                  p_nama: namaUser,
                  p_password: password,
                });
              if (linkError || !linkedData) {
                throw new Error(
                  "Data profil tidak ditemukan atau password salah saat memulihkan koneksi.",
                );
              }

              // Ambil ulang data profil
              const { data: retryProfile } = await supabaseClient
                .from("users")
                .select("*")
                .eq("auth_id", authResult.data.user.id)
                .maybeSingle();
              if (!retryProfile)
                throw new Error("Data profil benar-benar tidak ditemukan.");
              profile = retryProfile;
            }
            userData = profile;
          }

          // Simpan sesi login ke LocalStorage (sebagai transisi sebelum full JWT)
          localStorage.setItem("userLogin", JSON.stringify(userData));

          Swal.fire({
            title: "Berhasil Login!",
            text: `Selamat datang kembali, ${userData.nama}!`,
            icon: "success",
            timer: 1500,
            showConfirmButton: false,
            heightAuto: false,
          }).then(() => {
            // Super Admin tidak absen, langsung ke Admin Panel
            if (userData.role === "Super Admin") {
              window.location.href = "admin.html";
            } else {
              // HR dan Karyawan ke halaman absen
              window.location.href = "index.html";
            }
          });
        } catch (err) {
          console.error("Login Error:", err);
          let errMsg = err.message;
          if (!errMsg) {
            try {
              errMsg = JSON.stringify(err);
            } catch (e) {
              errMsg = String(err);
            }
          }
          if (errMsg === "{}")
            errMsg =
              "Kredensial tidak valid atau akun belum diaktifkan (Cek konsol browser).";

          Swal.fire({
            title: "Login Gagal",
            text: errMsg,
            icon: "error",
            heightAuto: false,
          });
          btnLogin.disabled = false;
          btnLogin.innerHTML = "LOGIN";
        }
      }
    </script>
  </body>
</html>
