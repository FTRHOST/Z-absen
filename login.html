<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Zie Absen</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
      body {
        background-color: #f4f6f9;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-card {
        border: none;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        overflow: hidden;
      }
      .login-header {
        background: linear-gradient(135deg, #0d6efd, #0043a8);
        color: white;
        padding: 30px 20px;
        text-align: center;
      }
      .login-header h3 {
        margin: 0;
        font-weight: 700;
      }
      .login-body {
        padding: 40px 30px;
        background-color: #ffffff;
      }
      .form-control {
        padding: 12px 15px;
        border-radius: 8px;
      }
      .btn-login {
        padding: 12px;
        font-weight: bold;
        border-radius: 8px;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
          <div class="card login-card">
            <div class="login-header">
              <h3>🏢 Zie Absen</h3>
              <p class="mb-0 mt-2 opacity-75">Silakan masuk ke akun Anda</p>
            </div>
            <div class="login-body">
              <form id="loginForm" onsubmit="prosesLogin(event)">
                <div class="mb-3">
                  <label
                    for="inputNama"
                    class="form-label fw-bold small text-muted"
                    >Nama Pengguna</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="inputNama"
                    placeholder="Masukkan nama Anda"
                    required
                  />
                </div>
                <div class="mb-4">
                  <label
                    for="inputPassword"
                    class="form-label fw-bold small text-muted"
                    >Password</label
                  >
                  <input
                    type="password"
                    class="form-control"
                    id="inputPassword"
                    placeholder="Masukkan password"
                    required
                  />
                </div>

                <div class="d-grid mb-3">
                  <button type="submit" class="btn btn-primary btn-login">
                    LOGIN
                  </button>
                </div>

                <div class="text-center mt-3">
                  <a href="#" class="text-decoration-none small"
                    >Lupa password? Hubungi HR</a
                  >
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Pustaka Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Konfigurasi Global -->
    <script src="config.js"></script>

    <script>
      // ==========================================
      // ==========================================
      // FUNGSI LOGIN
      // ==========================================
      async function prosesLogin(event) {
        event.preventDefault();
        const namaUser = document.getElementById("inputNama").value;
        const password = document.getElementById("inputPassword").value;
        const btnLogin = document.querySelector(".btn-login");

        btnLogin.disabled = true;
        btnLogin.innerHTML = "Memeriksa...";

        try {
          const { data, error } = await supabaseClient
            .from("users")
            .select("*")
            .eq("nama", namaUser)
            .eq("password", password)
            .single();

          if (error || !data) {
            throw new Error("Nama atau Password salah!");
          }

          // Simpan sesi login ke LocalStorage
          localStorage.setItem("userLogin", JSON.stringify(data));

          Swal.fire({
            title: "Berhasil Login!",
            text: `Selamat datang kembali, ${data.nama}!`,
            icon: "success",
            timer: 1500,
            showConfirmButton: false,
          }).then(() => {
            // Super Admin tidak absen, langsung ke Admin Panel
            if (data.role === "Super Admin") {
              window.location.href = "admin.html";
            } else {
              // HR dan Karyawan ke halaman absen
              window.location.href = "index.html";
            }
          });
        } catch (err) {
          Swal.fire("Login Gagal", err.message, "error");
          btnLogin.disabled = false;
          btnLogin.innerHTML = "LOGIN";
        }
      }
    </script>
  </body>
</html>
